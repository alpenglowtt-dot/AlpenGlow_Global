[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = []
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true

[functions.send-email-otp]
verify_jwt = false

[functions.verify-email-otp]
verify_jwt = false

[functions.send-sms-otp]
verify_jwt = false

[functions.verify-sms-otp]
verify_jwt = false

[functions.submit-contact]
verify_jwt = false

[functions.submit-lead]
verify_jwt = false

[functions.whatsapp-webhook]
verify_jwt = false

# CRM API — does its own auth via the x-crm-token header (CRM_PASSWORD secret),
# so JWT verification stays off at the gateway.
[functions.crm]
verify_jwt = false

# Staff-only email sender — also gated by the x-crm-token header.
[functions.send-lead-email]
verify_jwt = false

[functions.chat-compass]
verify_jwt = false
