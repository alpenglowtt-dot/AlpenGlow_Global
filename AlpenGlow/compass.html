<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMPASS — AlpenGlow Trip Planner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --orange:#ef7e19;
  --orange-light:#ff9d45;
  --orange-glow:rgba(239,126,25,.16);
  --bg:#12100e;
  --surface:#191512;
  --surface2:#201914;
  --surface3:#2a221a;
  --surface4:#31271d;
  --rule:rgba(255,255,255,.06);
  --white:#ffffff;
  --text:rgba(255,255,255,.92);
  --muted:rgba(255,255,255,.56);
  --ghost:rgba(255,255,255,.22);
  --green:#4fd39a;
  --red:#ef6f6f;
  --radius:18px;
  --font-display:'Playfair Display',Georgia,serif;
  --font-body:'DM Sans',system-ui,sans-serif;
  --ease:cubic-bezier(.22,1,.36,1);
}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font-body);
  color:var(--text);
  background:radial-gradient(circle at top,rgba(239,126,25,.04),transparent 40%),var(--bg);
  display:flex;flex-direction:column;
  font-size:15px;line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* ── Top bar ──────────────────────────────────── */
.topbar{
  flex-shrink:0;
  display:flex;align-items:center;gap:14px;
  padding:0 28px;height:62px;
  background:var(--surface);
  border-bottom:1px solid var(--rule);
  box-shadow:0 2px 14px rgba(0,0,0,.22);
}
.topbar-logo{
  display:flex;align-items:center;gap:10px;text-decoration:none;
}
.topbar-logo img{height:34px;width:auto;object-fit:contain}
.topbar-divider{
  width:1px;height:24px;background:var(--rule);flex-shrink:0;
}
.topbar-avatar{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--orange),#f5a623);
  display:flex;align-items:center;justify-content:center;
}
.topbar-avatar svg{width:18px;height:18px;color:#181818}
.topbar-text{flex:1;min-width:0}
.topbar-name{
  font-family:var(--font-display);
  font-style:italic;font-size:1.05rem;font-weight:400;
  color:var(--white);letter-spacing:.01em;line-height:1.2;
}
.topbar-sub{
  font-size:.65rem;color:var(--muted);
  letter-spacing:.07em;text-transform:uppercase;margin-top:1px;
}
.topbar-status{
  display:flex;align-items:center;gap:6px;
  font-size:.7rem;color:var(--muted);margin-left:auto;
}
#close-btn{
  width:34px;height:34px;border-radius:50%;flex-shrink:0;margin-left:12px;
  background:rgba(255,255,255,.06);border:1px solid var(--rule);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .2s,transform .15s;
}
#close-btn:hover{background:rgba(239,126,25,.15);border-color:rgba(239,126,25,.3);transform:scale(1.08)}
#close-btn svg{width:15px;height:15px;color:var(--muted)}
#close-btn:hover svg{color:var(--orange)}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--green);
  box-shadow:0 0 7px rgba(79,211,154,.6);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* ── Messages area ───────────────────────────── */
.chat-body{
  flex:1;overflow-y:auto;
  padding:24px 0;
  display:flex;flex-direction:column;
  gap:0;
  scrollbar-width:none;-ms-overflow-style:none;
}
.chat-body::-webkit-scrollbar{display:none}

.chat-inner{
  width:100%;max-width:740px;
  margin:0 auto;
  padding:0 20px;
  display:flex;flex-direction:column;gap:12px;
}

/* message rows */
.msg{display:flex;gap:10px;align-items:flex-end;max-width:82%}
.msg.assistant{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}

.bubble{
  padding:12px 16px;border-radius:18px;font-size:.88rem;
  line-height:1.65;word-break:break-word;
  animation:fadeup .22s var(--ease);
}
@keyframes fadeup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.msg.assistant .bubble{
  background:var(--surface2);
  border:1px solid var(--rule);
  color:var(--text);
  border-bottom-left-radius:5px;
}
.msg.user .bubble{
  background:var(--orange);
  color:#181818;font-weight:500;
  border-bottom-right-radius:5px;
}
.bubble a{color:#f5a623;text-underline-offset:2px}
.bubble strong{font-weight:600}

/* typing indicator */
.typing-bubble{
  display:flex;align-items:center;gap:4px;
  padding:13px 16px;
  background:var(--surface2);border:1px solid var(--rule);
  border-radius:18px;border-bottom-left-radius:5px;
  width:56px;
  animation:fadeup .2s var(--ease);
}
.typing-bubble span{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,255,255,.35);
  animation:bounce 1.2s ease-in-out infinite;
}
.typing-bubble span:nth-child(2){animation-delay:.2s}
.typing-bubble span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-5px);opacity:1}}

/* ── MCQ options ─────────────────────────────── */
.options-row{
  display:flex;flex-wrap:wrap;gap:8px;
  max-width:740px;margin:6px auto 0;padding:0 20px;
  width:100%;
  animation:fadeup .25s var(--ease);
}
.opt-btn{
  background:var(--surface3);
  border:1px solid rgba(239,126,25,.22);
  color:var(--text);
  font-family:var(--font-body);font-size:.8rem;font-weight:500;
  padding:8px 16px;border-radius:50px;cursor:pointer;
  transition:background .2s,border-color .2s,transform .15s;
  letter-spacing:.01em;
}
.opt-btn:hover{
  background:var(--orange-glow);
  border-color:var(--orange);
  color:var(--white);
  transform:translateY(-1px);
}

/* ── Input bar ───────────────────────────────── */
.input-bar{
  flex-shrink:0;
  padding:14px 20px 18px;
  background:var(--surface);
  border-top:1px solid var(--rule);
}
.input-inner{
  max-width:740px;margin:0 auto;
  display:flex;gap:10px;align-items:flex-end;
}
#msg-input{
  flex:1;min-height:42px;max-height:110px;
  background:var(--surface3);
  border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:10px 14px;
  color:var(--text);font-family:var(--font-body);font-size:.88rem;
  resize:none;outline:none;line-height:1.55;
  transition:border-color .2s;
}
#msg-input::placeholder{color:var(--muted)}
#msg-input:focus{border-color:rgba(239,126,25,.45)}
#send-btn{
  width:42px;height:42px;border-radius:12px;flex-shrink:0;
  background:var(--orange);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .2s,transform .15s;
}
#send-btn:hover{background:var(--orange-light);transform:scale(1.05)}
#send-btn:disabled{background:rgba(239,126,25,.25);cursor:not-allowed;transform:none}
#send-btn svg{width:17px;height:17px;color:#181818}

.powered{
  text-align:center;font-size:.6rem;letter-spacing:.06em;
  color:rgba(255,255,255,.18);text-transform:uppercase;
  margin-top:7px;
}

/* ── Not verified overlay ────────────────────── */
#unverified-gate{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;
  text-align:center;padding:24px;
}
#unverified-gate .gate-icon{
  width:64px;height:64px;border-radius:50%;
  background:var(--surface3);
  display:flex;align-items:center;justify-content:center;
  border:1px solid rgba(239,126,25,.2);
}
#unverified-gate .gate-icon svg{width:28px;height:28px;color:var(--orange)}
#unverified-gate h2{
  font-family:var(--font-display);font-style:italic;
  font-size:1.6rem;font-weight:400;color:var(--white);
}
#unverified-gate p{font-size:.88rem;color:var(--muted);max-width:340px;line-height:1.6}
#unverified-gate a{
  padding:.75rem 2rem;border-radius:50px;
  background:var(--orange);color:#181818;
  font-weight:600;font-size:.82rem;letter-spacing:.06em;
  text-transform:uppercase;text-decoration:none;
  transition:background .2s,transform .15s;
}
#unverified-gate a:hover{background:var(--orange-light);transform:translateY(-2px)}
</style>
</head>
<body>

<!-- Not-verified gate (hidden if verified) -->
<div id="unverified-gate" style="display:none">
  <div class="gate-icon">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
    </svg>
  </div>
  <h2>Verification Required</h2>
  <p>Please verify your identity on the main site before accessing the COMPASS trip planner.</p>
  <a href="index.html">Go Back &amp; Verify</a>
</div>

<!-- Top bar -->
<header class="topbar">
  <a class="topbar-logo" href="index.html">
    <img src="images/alpenglow-removebg-preview.png" alt="AlpenGlow" onerror="this.style.display='none'">
  </a>
  <div class="topbar-divider"></div>
  <div class="topbar-avatar">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/>
      <polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/>
    </svg>
  </div>
  <div class="topbar-text">
    <div class="topbar-name">COMPASS</div>
    <div class="topbar-sub">AlpenGlow Trip Planning Assistant</div>
  </div>
  <div class="topbar-status"><div class="status-dot"></div>Online</div>
  <button id="close-btn" onclick="history.length>1?history.back():location.href='index.html'" title="Close" aria-label="Close COMPASS">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </button>
</header>

<!-- Messages -->
<div class="chat-body" id="chat-body">
  <div class="chat-inner" id="chat-inner"></div>
</div>

<!-- Input -->
<div class="input-bar">
  <div class="input-inner">
    <textarea id="msg-input" placeholder="Type a message, or choose an option above…" rows="1"></textarea>
    <button id="send-btn" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
  <div class="powered">AlpenGlow Global</div>
</div>

<script>
;(function(){
  'use strict'

  /* ── Verification check ─────────────────────────────── */
  if (!sessionStorage.getItem('ag_verified')) {
    document.getElementById('unverified-gate').style.display = 'flex'
    // Hide main UI until verified
    document.querySelector('.topbar').style.display = 'none'
    document.getElementById('chat-body').style.display = 'none'
    document.querySelector('.input-bar').style.display = 'none'
    return
  }

  /* ── Constants ──────────────────────────────────────── */
  var SB_URL = 'https://yexrmmhadfscormovskn.supabase.co'
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlleHJtbWhhZGZzY29ybW92c2tuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjg0NzYsImV4cCI6MjA5Nzk0NDQ3Nn0.vxkcZDdTfE0qDxW8YwsnbGsLaaSUfwgZ78nQicq2Uoc'
  var FN_URL = SB_URL + '/functions/v1/chat-compass'
  var H      = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' }

  var _messages  = []
  var _typing    = false
  var _optionsEl = null   // current MCQ options row element

  var chatInner = document.getElementById('chat-inner')
  var chatBody  = document.getElementById('chat-body')
  var input     = document.getElementById('msg-input')
  var sendBtn   = document.getElementById('send-btn')

  /* ── Scroll to bottom ───────────────────────────────── */
  function _scroll() {
    chatBody.scrollTop = chatBody.scrollHeight
  }

  /* ── Render a message bubble ────────────────────────── */
  function _appendMessage(role, html) {
    _clearOptions()
    var wrap   = document.createElement('div')
    wrap.className = 'msg ' + role
    var bubble = document.createElement('div')
    bubble.className = 'bubble'
    bubble.innerHTML = html
    wrap.appendChild(bubble)
    chatInner.appendChild(wrap)
    _scroll()
    return wrap
  }

  /* ── Format raw text → safe HTML ───────────────────── */
  function _fmt(text) {
    return text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\[([^\]]+)\]\((https?:\/\/[^\)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>')
      .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
      .replace(/\n/g,'<br>')
  }

  /* ── Render MCQ option buttons ──────────────────────── */
  function _renderOptions(opts) {
    _clearOptions()
    var row = document.createElement('div')
    row.className = 'options-row'
    opts.forEach(function(opt) {
      var btn = document.createElement('button')
      btn.className = 'opt-btn'
      btn.textContent = opt.trim()
      btn.addEventListener('click', function() {
        _selectOption(opt.trim())
      })
      row.appendChild(btn)
    })
    // Append the options row to chat-inner (outside the message wraps)
    chatInner.appendChild(row)
    _optionsEl = row
    _scroll()
  }

  function _clearOptions() {
    if (_optionsEl && _optionsEl.parentNode) {
      _optionsEl.parentNode.removeChild(_optionsEl)
    }
    _optionsEl = null
  }

  function _selectOption(text) {
    _clearOptions()
    input.value = ''
    _doSend(text)
  }

  /* ── Typing indicator ───────────────────────────────── */
  function _showTyping() {
    _typing = true
    var wrap = document.createElement('div')
    wrap.className = 'msg assistant'
    wrap.id = 'typing-row'
    var bubble = document.createElement('div')
    bubble.className = 'typing-bubble'
    bubble.innerHTML = '<span></span><span></span><span></span>'
    wrap.appendChild(bubble)
    chatInner.appendChild(wrap)
    _scroll()
  }
  function _hideTyping() {
    _typing = false
    var el = document.getElementById('typing-row')
    if (el) el.remove()
  }

  /* ── Parse assistant response ───────────────────────── */
  function _parseResponse(raw) {
    // Extract [OPTIONS]...[/OPTIONS]
    var opts     = null
    var optMatch = raw.match(/\[OPTIONS\]([\s\S]*?)\[\/OPTIONS\]/)
    if (optMatch) {
      opts = optMatch[1].split('|').map(function(s){ return s.trim() }).filter(Boolean)
    }
    // Strip [OPTIONS] block from display text
    var display = raw.replace(/\[OPTIONS\][\s\S]*?\[\/OPTIONS\]/g, '').trim()
    return { display: display, opts: opts }
  }

  /* ── Send a message ─────────────────────────────────── */
  function _doSend(text) {
    if (!text || _typing) return
    _appendMessage('user', _fmt(text))
    _messages.push({ role: 'user', content: text })
    _showTyping()
    sendBtn.disabled = true

    fetch(FN_URL, {
      method: 'POST',
      headers: H,
      body: JSON.stringify({ messages: _messages })
    })
    .then(function(r){ return r.json() })
    .then(function(data){
      _hideTyping()
      sendBtn.disabled = false
      if (data.error) {
        _appendMessage('assistant', 'Sorry, something went wrong. Please try again.')
        return
      }
      var raw = data.content || ''
      _messages.push({ role: 'assistant', content: raw })

      var parsed = _parseResponse(raw)
      if (parsed.display) _appendMessage('assistant', _fmt(parsed.display))
      if (parsed.opts && parsed.opts.length) _renderOptions(parsed.opts)
    })
    .catch(function(){
      _hideTyping()
      sendBtn.disabled = false
      _appendMessage('assistant', 'Connection error — please check your internet and try again.')
    })
  }

  /* ── Input event handlers ───────────────────────────── */
  sendBtn.addEventListener('click', function(){
    var text = input.value.trim()
    if (!text) return
    input.value = ''
    input.style.height = 'auto'
    _doSend(text)
  })

  input.addEventListener('keydown', function(e){
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault()
      var text = input.value.trim()
      if (!text) return
      input.value = ''
      input.style.height = 'auto'
      _doSend(text)
    }
  })

  input.addEventListener('input', function(){
    this.style.height = 'auto'
    this.style.height = Math.min(this.scrollHeight, 110) + 'px'
  })

  /* ── Greeting ───────────────────────────────────────── */
  var greeting = "Hi! I'm COMPASS, AlpenGlow's trip planner. Are you dreaming of somewhere specific, or would you like help figuring out where to go?"
  _appendMessage('assistant', _fmt(greeting))
  _messages.push({ role: 'assistant', content: greeting })
  // Show initial quick-start options
  _renderOptions(['I have a destination in mind', 'Help me decide', 'Tell me about your packages', 'Current offers & deals'])

})()
</script>
</body>
</html>
