<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dev — Content Editor · Alpen Glow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --dark: #0a0a0a;
  --dark2: #111;
  --orange: #ef7e19;
  --orange-light: #f4952e;
  --white: #f4f0e8;
  --font-display: 'Cormorant Garamond', serif;
  --font-body: 'Inter', sans-serif;
  --ease-out: cubic-bezier(0.16,1,0.3,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
html, body { height: 100%; background: var(--dark); color: var(--white); font-family: var(--font-body) }

/* ── LOGIN ── */
#login-gate {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: radial-gradient(ellipse at 30% 60%, rgba(239,126,25,.1) 0%, transparent 55%),
              radial-gradient(ellipse at 70% 30%, rgba(239,126,25,.07) 0%, transparent 50%), var(--dark);
  z-index: 999;
}
.login-card {
  background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.09);
  backdrop-filter: blur(20px); border-radius: 24px; padding: 2.8rem 2.4rem;
  width: 100%; max-width: 380px; text-align: center;
}
.login-card img { height: 46px; margin-bottom: 1.5rem; filter: brightness(1.1) }
.login-card h2 { font-family: var(--font-display); font-size: 1.8rem; font-weight: 300; margin-bottom: .3rem }
.login-card p { font-size: .8rem; color: rgba(255,255,255,.4); margin-bottom: 1.6rem }
.login-tag { display: inline-block; font-size: .65rem; font-weight: 700; letter-spacing: .12em;
  text-transform: uppercase; color: var(--orange); background: rgba(239,126,25,.12);
  border: 1px solid rgba(239,126,25,.25); border-radius: 20px; padding: .22rem .7rem; margin-bottom: .9rem }
.login-input {
  width: 100%; padding: .82rem 1rem; background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.12); border-radius: 12px; color: var(--white);
  font-size: .88rem; outline: none; font-family: var(--font-body); transition: border-color .2s; margin-bottom: .9rem;
}
.login-input:focus { border-color: var(--orange) }
.btn-login {
  width: 100%; padding: .82rem; background: var(--orange); color: var(--dark);
  font-size: .86rem; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: background .2s;
}
.btn-login:hover { background: var(--orange-light) }
.login-err { min-height: 1.2rem; font-size: .78rem; color: #f87171; margin-top: .7rem }

/* ── APP SHELL ── */
#app { display: none; min-height: 100vh }

.dev-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: .9rem 2rem; border-bottom: 1px solid rgba(255,255,255,.06);
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,10,.9); backdrop-filter: blur(16px);
}
.dev-brand { display: flex; align-items: center; gap: .9rem }
.dev-brand img { height: 34px; filter: brightness(1.1) }
.dev-brand-text { display: flex; flex-direction: column }
.dev-brand-name { font-family: var(--font-display); font-size: 1rem; font-weight: 400; color: var(--white); line-height: 1 }
.dev-brand-sub { font-size: .63rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase; color: var(--orange); margin-top: .2rem }
.dev-header-right { display: flex; align-items: center; gap: 1rem }
.dev-badge { font-size: .63rem; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  background: rgba(239,126,25,.12); border: 1px solid rgba(239,126,25,.25); color: var(--orange);
  padding: .25rem .7rem; border-radius: 20px }
.btn-logout { font-size: .75rem; color: rgba(255,255,255,.35); background: none; border: none; cursor: pointer; transition: color .2s }
.btn-logout:hover { color: rgba(255,255,255,.7) }

.dev-main { max-width: 900px; margin: 0 auto; padding: 2.2rem 1.5rem }

/* ── CONTENT BLOCK ── */
.content-block { background: rgba(255,255,255,.03); border: 1px solid rgba(255,255,255,.07);
  border-radius: 20px; padding: 1.6rem; margin-bottom: 2rem }
.content-block-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.4rem }
.content-block-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 400; color: var(--white) }
.btn-add { padding: .52rem 1.1rem; border-radius: 10px; background: rgba(239,126,25,.15);
  border: 1px solid rgba(239,126,25,.3); color: var(--orange); font-size: .76rem;
  font-weight: 600; cursor: pointer; transition: all .2s }
.btn-add:hover { background: rgba(239,126,25,.28) }

/* ── CONTENT ROWS ── */
.content-row { display: flex; align-items: center; gap: 1rem; padding: .85rem 1rem;
  border-radius: 12px; border: 1px solid rgba(255,255,255,.05); background: rgba(255,255,255,.02);
  margin-bottom: .6rem; transition: background .15s }
.content-row:hover { background: rgba(255,255,255,.04) }
.cr-img { width: 52px; height: 42px; border-radius: 8px; object-fit: cover; flex-shrink: 0 }
.cr-info { flex: 1; min-width: 0 }
.cr-title { font-size: .85rem; color: var(--white); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis }
.cr-sub { font-size: .72rem; color: rgba(255,255,255,.4); margin-top: .15rem }
.cr-code { font-size: .7rem; font-weight: 700; letter-spacing: .08em; color: var(--orange);
  background: rgba(239,126,25,.1); padding: .15rem .5rem; border-radius: 4px; margin-left: .4rem }
.cr-actions { display: flex; align-items: center; gap: .4rem; flex-shrink: 0 }
.cr-toggle { width: 36px; height: 20px; border-radius: 10px; border: none; cursor: pointer;
  position: relative; transition: background .2s; flex-shrink: 0 }
.cr-toggle.on { background: rgba(34,197,94,.5) }
.cr-toggle.off { background: rgba(255,255,255,.12) }
.cr-toggle::after { content: ''; position: absolute; top: 2px; width: 16px; height: 16px;
  border-radius: 50%; background: var(--white); transition: left .2s }
.cr-toggle.on::after { left: 18px }
.cr-toggle.off::after { left: 2px }
.cr-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid rgba(255,255,255,.1);
  background: rgba(255,255,255,.04); color: rgba(255,255,255,.5);
  display: flex; align-items: center; justify-content: center; font-size: .8rem; cursor: pointer; transition: all .2s }
.cr-btn:hover { background: rgba(255,255,255,.1); color: var(--white); border-color: rgba(255,255,255,.25) }
.cr-btn.del:hover { background: rgba(239,68,68,.15); color: #f87171; border-color: rgba(239,68,68,.3) }

/* ── EDIT DRAWER ── */
#ce-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.65);
  backdrop-filter: blur(4px); display: none; opacity: 0; transition: opacity .3s }
#ce-overlay.open { display: block; opacity: 1 }
#ce-drw { position: fixed; top: 0; right: -520px; bottom: 0; z-index: 501; width: 500px;
  max-width: 100vw; background: rgba(14,14,14,.99); border-left: 2px solid var(--orange);
  overflow-y: auto; transition: right .4s var(--ease-out) }
#ce-drw.open { right: 0 }
.ce-head { position: sticky; top: 0; z-index: 10; background: rgba(14,14,14,.96);
  backdrop-filter: blur(10px); padding: 1.1rem 1.4rem; border-bottom: 1px solid rgba(255,255,255,.06);
  display: flex; align-items: center; justify-content: space-between }
.ce-title { font-family: var(--font-display); font-size: 1.2rem; font-weight: 400; color: var(--white) }
.ce-close { width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,.08);
  border: none; color: rgba(255,255,255,.6); display: flex; align-items: center; justify-content: center;
  font-size: .95rem; cursor: pointer; transition: all .2s }
.ce-close:hover { background: rgba(239,126,25,.2); color: var(--orange) }
.ce-body { padding: 1.4rem }
.ce-field { margin-bottom: 1.1rem }
.ce-lbl { font-size: .63rem; font-weight: 600; letter-spacing: .12em; text-transform: uppercase;
  color: rgba(255,255,255,.35); margin-bottom: .35rem; display: block }
.ce-input, .ce-textarea { width: 100%; padding: .7rem .9rem; background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.1); border-radius: 10px; color: var(--white);
  font-size: .84rem; outline: none; transition: border-color .2s; font-family: var(--font-body) }
.ce-input:focus, .ce-textarea:focus { border-color: var(--orange) }
.ce-input::placeholder, .ce-textarea::placeholder { color: rgba(255,255,255,.25) }
.ce-textarea { min-height: 90px; resize: vertical; line-height: 1.6 }
.ce-textarea.tall { min-height: 160px }
.ce-row { display: grid; grid-template-columns: 1fr 1fr; gap: .8rem }
.ce-active-row { display: flex; align-items: center; gap: .8rem; margin-bottom: 1.1rem }
.ce-active-lbl { font-size: .82rem; color: rgba(255,255,255,.7) }
.ce-footer { padding: 1rem 1.4rem; border-top: 1px solid rgba(255,255,255,.06); display: flex; gap: .6rem }
.btn-ce-save { flex: 1; padding: .7rem; border-radius: 10px; background: var(--orange);
  color: var(--dark); font-size: .84rem; font-weight: 600; border: none; cursor: pointer; transition: all .2s }
.btn-ce-save:hover { background: var(--orange-light) }
.btn-ce-cancel { padding: .7rem 1.2rem; border-radius: 10px; background: transparent;
  border: 1px solid rgba(255,255,255,.15); color: rgba(255,255,255,.6); font-size: .84rem; cursor: pointer; transition: all .2s }
.btn-ce-cancel:hover { border-color: rgba(255,255,255,.3); color: var(--white) }
.ce-img-preview { width: 100%; height: 100px; object-fit: cover; border-radius: 8px; margin-top: .5rem; display: none }
.ce-img-preview.show { display: block }
.ce-img-group { display: flex; gap: .5rem; align-items: stretch }
.ce-img-group .ce-input { flex: 1; min-width: 0 }
.btn-upload-img { display: flex; align-items: center; gap: .4rem; padding: .7rem .85rem; background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12); border-radius: 10px; color: rgba(255,255,255,.55); font-size: .76rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all .2s; flex-shrink: 0; line-height: 1 }
.btn-upload-img:hover { border-color: var(--orange); color: var(--orange); background: rgba(239,126,25,.08) }
.btn-upload-img.uploading { opacity: .5; pointer-events: none }
.sd-img-group { display: flex; gap: .4rem; grid-column: span 2 }
.sd-img-group .ce-input { flex: 1; min-width: 0 }
.sd-img-group .btn-upload-img { padding: .7rem .7rem; font-size: .72rem }

.empty-note { font-size: .82rem; color: rgba(255,255,255,.3); padding: .5rem 0 }

/* Sub-destination rows inside drawer */
.sd-row { display: grid; grid-template-columns: 1fr 1fr; gap: .5rem; background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); border-radius: 10px; padding: .75rem; margin-bottom: .5rem; position: relative; }
.sd-row .ce-input { margin: 0 }
.sd-remove { position: absolute; top: .5rem; right: .5rem; width: 22px; height: 22px; border-radius: 50%; background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3); color: #f87171; font-size: .75rem; display: flex; align-items: center; justify-content: center; cursor: pointer; line-height: 1 }
.sd-remove:hover { background: rgba(239,68,68,.3) }
.btn-add-sd { width: 100%; padding: .55rem; border-radius: 8px; background: rgba(255,255,255,.05); border: 1px dashed rgba(255,255,255,.15); color: rgba(255,255,255,.5); font-size: .78rem; cursor: pointer; transition: all .2s; margin-top: .3rem }
.btn-add-sd:hover { border-color: var(--orange); color: var(--orange) }
.ce-section-lbl { font-size: .63rem; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: rgba(255,255,255,.25); margin: 1.2rem 0 .6rem; border-top: 1px solid rgba(255,255,255,.06); padding-top: .9rem }

@media(max-width: 600px) {
  #ce-drw { width: 100%; right: -100% }
  .dev-header { padding: .75rem 1rem }
  .dev-main { padding: 1.4rem 1rem }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-gate">
  <div class="login-card">
    <img src="alpenglow-removebg-preview.png" alt="Alpen Glow">
    <div class="login-tag">Dev Access Only</div>
    <h2>Content Editor</h2>
    <p>For developer use only — manage offers and blog posts</p>
    <input type="password" id="pw" class="login-input" placeholder="Dev password"
      onkeydown="if(event.key==='Enter')login()">
    <button class="btn-login" onclick="login()">Enter Editor</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="dev-header">
    <div class="dev-brand">
      <img src="alpenglow-removebg-preview.png" alt="Alpen Glow">
      <div class="dev-brand-text">
        <div class="dev-brand-name">Alpen Glow Tours</div>
        <div class="dev-brand-sub">Content Editor</div>
      </div>
    </div>
    <div class="dev-header-right">
      <span class="dev-badge">Dev Only</span>
      <button class="btn-logout" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <main class="dev-main">

    <!-- Offers -->
    <div class="content-block">
      <div class="content-block-head">
        <div class="content-block-title">Offers & Promo Codes</div>
        <button class="btn-add" onclick="openCE('offer', null)">+ Add Offer</button>
      </div>
      <div id="offers-list"><div class="empty-note">Loading…</div></div>
    </div>

    <!-- Blog Posts -->
    <div class="content-block">
      <div class="content-block-head">
        <div class="content-block-title">Blog Posts</div>
        <button class="btn-add" onclick="openCE('blog', null)">+ Add Post</button>
      </div>
      <div id="blog-list"><div class="empty-note">Loading…</div></div>
    </div>

    <!-- Destinations -->
    <div class="content-block">
      <div class="content-block-head">
        <div class="content-block-title">Our Destinations</div>
        <button class="btn-add" onclick="openCE('dest', null)">+ Add Destination</button>
      </div>
      <div id="dest-list"><div class="empty-note">Loading…</div></div>
    </div>

    <!-- Tour Packages -->
    <div class="content-block">
      <div class="content-block-head">
        <div class="content-block-title">Tour Packages</div>
        <button class="btn-add" onclick="openCE('pkg', null)">+ Add Package</button>
      </div>
      <div id="pkg-list"><div class="empty-note">Loading…</div></div>
    </div>

  </main>
</div>

<!-- EDIT DRAWER -->
<div id="ce-overlay" onclick="closeCE()"></div>
<div id="ce-drw">
  <div class="ce-head">
    <div class="ce-title" id="ce-drw-title">Edit Offer</div>
    <button class="ce-close" onclick="closeCE()">×</button>
  </div>
  <div class="ce-body" id="ce-body"></div>
  <div class="ce-footer">
    <button class="btn-ce-save" onclick="saveCE()">Save</button>
    <button class="btn-ce-cancel" onclick="closeCE()">Cancel</button>
  </div>
</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────
const DEV_PASS = 'alpenglow_dev_2025'   // change this to your dev password

const SB_URL = 'https://yexrmmhadfscormovskn.supabase.co'
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlleHJtbWhhZGZzY29ybW92c2tuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjg0NzYsImV4cCI6MjA5Nzk0NDQ3Nn0.vxkcZDdTfE0qDxW8YwsnbGsLaaSUfwgZ78nQicq2Uoc'

const H = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` }

// ── AUTH ─────────────────────────────────────────────────────
function login() {
  const val = document.getElementById('pw').value
  if (val === DEV_PASS) {
    sessionStorage.setItem('ag_dev_auth', '1')
    document.getElementById('login-gate').style.display = 'none'
    document.getElementById('app').style.display = 'block'
    loadAll()
  } else {
    const err = document.getElementById('login-err')
    err.textContent = 'Incorrect password.'
    document.getElementById('pw').value = ''
    setTimeout(() => { err.textContent = '' }, 2500)
  }
}

function logout() {
  sessionStorage.removeItem('ag_dev_auth')
  location.reload()
}

if (sessionStorage.getItem('ag_dev_auth') === '1') {
  document.getElementById('login-gate').style.display = 'none'
  document.getElementById('app').style.display = 'block'
  document.addEventListener('DOMContentLoaded', loadAll)
}

// ── HTML ESCAPE ───────────────────────────────────────────────
function e(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')
}

// ── DATA ─────────────────────────────────────────────────────
let ALL_OFFERS = [], ALL_BLOGS = [], ALL_DESTS = [], ALL_PKGS = []
let CE_TYPE = null, CE_ID = null

async function loadAll() {
  const [offers, blogs, dests, pkgs] = await Promise.all([
    fetch(`${SB_URL}/rest/v1/offers?order=created_at.asc`,       { headers: H }).then(r => r.json()).catch(() => []),
    fetch(`${SB_URL}/rest/v1/blog_posts?order=created_at.asc`,   { headers: H }).then(r => r.json()).catch(() => []),
    fetch(`${SB_URL}/rest/v1/destinations?order=sort_order.asc`, { headers: H }).then(r => r.json()).catch(() => []),
    fetch(`${SB_URL}/rest/v1/packages?order=sort_order.asc`,     { headers: H }).then(r => r.json()).catch(() => [])
  ])
  ALL_OFFERS = Array.isArray(offers) ? offers : []
  ALL_BLOGS  = Array.isArray(blogs)  ? blogs  : []
  ALL_DESTS  = Array.isArray(dests)  ? dests  : []
  ALL_PKGS   = Array.isArray(pkgs)   ? pkgs   : []
  renderOffers()
  renderBlogs()
  renderDests()
  renderPkgs()
}

// ── RENDER OFFERS ─────────────────────────────────────────────
function renderOffers() {
  const el = document.getElementById('offers-list')
  if (!ALL_OFFERS.length) { el.innerHTML = '<div class="empty-note">No offers yet. Click "+ Add Offer" to create one.</div>'; return }
  el.innerHTML = ALL_OFFERS.map(o => `
    <div class="content-row">
      <img class="cr-img" src="${e(o.image_url||'')}" onerror="this.style.display='none'" alt="">
      <div class="cr-info">
        <div class="cr-title">${e(o.title)} <span class="cr-code">${e(o.code)}</span></div>
        <div class="cr-sub">${e(o.badge||'')} · ${e(o.description||'').slice(0,72)}${(o.description||'').length>72?'…':''}</div>
      </div>
      <div class="cr-actions">
        <button class="cr-toggle ${o.active?'on':'off'}" title="${o.active?'Active':'Inactive'}"
          onclick="toggleItem('offers','${o.id}',${!o.active})"></button>
        <button class="cr-btn" title="Edit" onclick="openCE('offer','${o.id}')">✏</button>
        <button class="cr-btn del" title="Delete" onclick="deleteItem('offers','${o.id}',this)">🗑</button>
      </div>
    </div>`).join('')
}

// ── RENDER BLOGS ──────────────────────────────────────────────
function renderBlogs() {
  const el = document.getElementById('blog-list')
  if (!ALL_BLOGS.length) { el.innerHTML = '<div class="empty-note">No blog posts yet. Click "+ Add Post" to create one.</div>'; return }
  el.innerHTML = ALL_BLOGS.map(b => `
    <div class="content-row">
      <img class="cr-img" src="${e(b.image_url||'')}" onerror="this.style.display='none'" alt="">
      <div class="cr-info">
        <div class="cr-title">${e(b.title)}</div>
        <div class="cr-sub">${e(b.meta||'')} · ${e(b.excerpt||'').slice(0,72)}${(b.excerpt||'').length>72?'…':''}</div>
      </div>
      <div class="cr-actions">
        <button class="cr-toggle ${b.active?'on':'off'}" title="${b.active?'Active':'Inactive'}"
          onclick="toggleItem('blog_posts','${b.id}',${!b.active})"></button>
        <button class="cr-btn" title="Edit" onclick="openCE('blog','${b.id}')">✏</button>
        <button class="cr-btn del" title="Delete" onclick="deleteItem('blog_posts','${b.id}',this)">🗑</button>
      </div>
    </div>`).join('')
}

// ── OPEN EDITOR DRAWER ────────────────────────────────────────
function openCE(type, id) {
  CE_TYPE = type; CE_ID = id
  const isOffer = type === 'offer'
  const item = id ? (isOffer ? ALL_OFFERS : ALL_BLOGS).find(x => x.id === id) : null

  document.getElementById('ce-drw-title').textContent = id
    ? (isOffer ? 'Edit Offer' : 'Edit Blog Post')
    : (isOffer ? 'New Offer'  : 'New Blog Post')

  if (isOffer) {
    document.getElementById('ce-body').innerHTML = `
      <div class="ce-field">
        <label class="ce-lbl">Title</label>
        <input class="ce-input" id="ce-title" placeholder="e.g. Summer Beach Escape" value="${e(item?.title||'')}">
      </div>
      <div class="ce-row">
        <div class="ce-field">
          <label class="ce-lbl">Badge</label>
          <input class="ce-input" id="ce-badge" placeholder="e.g. 30% OFF" value="${e(item?.badge||'')}">
        </div>
        <div class="ce-field">
          <label class="ce-lbl">Promo Code</label>
          <input class="ce-input" id="ce-code" placeholder="e.g. SUMMER30"
            value="${e(item?.code||'')}" style="text-transform:uppercase"
            oninput="this.value=this.value.toUpperCase()">
        </div>
      </div>
      <div class="ce-field">
        <label class="ce-lbl">Description</label>
        <textarea class="ce-textarea" id="ce-desc" placeholder="Short description shown on offer card">${e(item?.description||'')}</textarea>
      </div>
      <div class="ce-field">
        <label class="ce-lbl">CTA Button Text</label>
        <input class="ce-input" id="ce-cta" placeholder="e.g. Claim Offer →" value="${e(item?.cta_text||'Claim Offer →')}">
      </div>
      ${ceImgField('ce-img','ce-img-preview',item?.image_url,'Image (URL or upload from folder)')}
      <div class="ce-active-row">
        <button class="cr-toggle ${(item?.active!==false)?'on':'off'}" id="ce-active-toggle"
          onclick="this.classList.toggle('on');this.classList.toggle('off')"></button>

function closeCE() {

function previewImg(url, previewId) {
  const img = document.getElementById(previewId || 'ce-img-preview')
  if (!img) return
  if (url) { img.src = url; img.classList.add('show') }
  else { img.classList.remove('show') }
}

// ── IMAGE UPLOAD TO SUPABASE STORAGE ─────────────────────────
// Requires a PUBLIC bucket named "site-images" in Supabase Storage.
// Setup: Supabase Dashboard → Storage → New Bucket → Name: site-images → Public: ON
async function _doUpload(file) {
  const ext  = file.name.split('.').pop().toLowerCase()
  const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_')
  const fname = `${Date.now()}-${safe}`
  const res = await fetch(`${SB_URL}/storage/v1/object/site-images/${fname}`, {
    method: 'POST',
    headers: {
      'apikey': SB_KEY,
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': file.type || 'application/octet-stream',
    },
    body: file
  })
  if (!res.ok) {
    const err = await res.json().catch(() => ({}))
    throw new Error(err.message || `HTTP ${res.status}`)
  }
  return `${SB_URL}/storage/v1/object/public/site-images/${fname}`
}

async function uploadImg(fileInput, urlInputId, previewId) {
  const file = fileInput.files[0]
  if (!file) return
  const label = fileInput.closest('.btn-upload-img')
  if (label) label.classList.add('uploading')
  // Show local preview immediately while uploading
  const reader = new FileReader()
  reader.onload = ev => previewImg(ev.target.result, previewId)
  reader.readAsDataURL(file)
  try {
    const url = await _doUpload(file)
    const inp = document.getElementById(urlInputId)
    if (inp) { inp.value = url; previewImg(url, previewId) }
  } catch(err) {
    alert(`Upload failed: ${err.message}\n\nMake sure you have created a "site-images" bucket in Supabase:\nStorage → New Bucket → Name: site-images → Public: ON`)
  } finally {
    if (label) label.classList.remove('uploading')
    fileInput.value = ''
  }
}

async function uploadImgNearby(fileInput, targetSelector) {
  const file = fileInput.files[0]
  if (!file) return
  const label = fileInput.closest('.btn-upload-img')
  if (label) label.classList.add('uploading')
  try {
    const url = await _doUpload(file)
    const target = fileInput.closest('.sd-row')?.querySelector(targetSelector)
      || fileInput.closest('.sd-img-group')?.querySelector(targetSelector)
    if (target) target.value = url
  } catch(err) {
    alert(`Upload failed: ${err.message}\n\nSetup: Supabase → Storage → New Bucket → site-images → Public ON`)
  } finally {
    if (label) label.classList.remove('uploading')
    fileInput.value = ''
  }
}

// Helper: generates the image field HTML (URL input + Upload button + preview)
function ceImgField(inputId, previewId, value, labelText) {
  const v = value || ''
  const show = v ? ' show' : ''
  return `
    <div class="ce-field">
      <label class="ce-lbl">${labelText || 'Image'}</label>
      <div class="ce-img-group">
        <input class="ce-input" id="${inputId}" placeholder="https://… or paste URL"
          value="${e(v)}" oninput="previewImg(this.value,'${previewId}')">
        <label class="btn-upload-img" title="Upload from your computer">
          &#128193; Upload
          <input type="file" accept="image/*" style="display:none"
            onchange="uploadImg(this,'${inputId}','${previewId}')">
        </label>
      </div>
      <img id="${previewId}" class="ce-img-preview${show}" src="${v}" alt="">
    </div>`
}

// ── SAVE ─────────────────────────────────────────────────────
async function saveCE() {
  const isOffer = CE_TYPE === 'offer'
  const active  = document.getElementById('ce-active-toggle').classList.contains('on')
  const table   = isOffer ? 'offers' : 'blog_posts'

  const body = isOffer ? {
    title:       document.getElementById('ce-title').value.trim(),

    code:        document.getElementById('ce-code').value.trim().toUpperCase(),
    description: document.getElementById('ce-desc').value.trim(),
    cta_text:    document.getElementById('ce-cta').value.trim() || 'Claim Offer →',
    image_url:   document.getElementById('ce-img').value.trim(),

  } : {
    title:     document.getElementById('ce-title').value.trim(),
    meta:      document.getElementById('ce-meta').value.trim(),
    excerpt:   document.getElementById('ce-excerpt').value.trim(),

  if (!body.title) { alert('Title is required.'); return }

  const btn = document.querySelector('.btn-ce-save')

  try {
    if (CE_ID) {
      const res = await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${CE_ID}`, {
        method: 'PATCH',
        headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(body)
      })
      if (!res.ok) throw new Error(`HTTP ${res.status}`)
    } else {
      const res = await fetch(`${SB_URL}/rest/v1/${table}`, {
        method: 'POST',
        headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
        body: JSON.stringify(body)

  } catch(err) {
    alert('Save failed: ' + err.message)

// ── TOGGLE ACTIVE ─────────────────────────────────────────────
async function toggleItem(table, id, newActive) {
  await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
    method: 'PATCH',
    headers: { ...H, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ active: newActive })
  }).catch(() => {})
  await loadAll()
}

// ── DELETE (double-click confirm) ─────────────────────────────
let _delTarget = null
async function deleteItem(table, id, btn) {
  if (_delTarget === id) {
    await fetch(`${SB_URL}/rest/v1/${table}?id=eq.${id}`, {
      method: 'DELETE', headers: H
    }).catch(() => {})
    _delTarget = null
    await loadAll()
    return
  }
  _delTarget = id
  const orig = btn.innerHTML
  btn.innerHTML = '✓?'; btn.style.color = '#f87171'
  setTimeout(() => {
    if (_delTarget === id) { _delTarget = null; btn.innerHTML = orig; btn.style.color = '' }
  }, 2500)
}
